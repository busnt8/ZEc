name: equal

on:
  push:

jobs:
  positive:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lifetime: ["nevertheless", "difficulty", "goal", "card", "shore"]
        vacuum: ["ambition", "romantic", "exception", "colony"]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '25'
    - run: java --enable-native-access=ALL-UNNAMED -jar YG.jar
